# Run `cargo install-local` from the repo (or a subdirectory): build release + install to INSTALL_PREFIX (default ~/.local/bin).
# After `cargo install --path .`, the `cargo-install-local` binary on PATH handles the same workflow from any cwd.
#
# Parallelism: `cargo test` / `cargo build` default to one rustc job per logical CPU (unset `CARGO_BUILD_JOBS` / no `build.jobs` here).
# The Rust test harness also runs tests in parallel across logical CPUs unless `RUST_TEST_THREADS` is set (e.g. `1` for serial debugging).

[alias]
install-local = "run --bin cargo-install-local --"
