name: CI

on:
  pull_request:
    paths:
      - "node/src/**"
      - "node/package.json"
      - "node/package-lock.json"
      - "node/tsconfig*.json"
      - "node/vitest.config.ts"
      - "node/vitest.eval.config.ts"
      - ".nvmrc"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "node/src/**"
      - "node/package.json"
      - "node/package-lock.json"
      - "node/tsconfig*.json"
      - "node/vitest.config.ts"
      - "node/vitest.eval.config.ts"
      - ".nvmrc"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
