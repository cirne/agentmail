name: Release

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Label embedded in archive names (e.g. test-20260330). For a real release, push a v* tag instead."
        required: true
        default: "test"
      create_github_release:
        description: "If true, create/update a GitHub Release with tag = version label. If false, bundles attach only to the workflow run (typical test build)."
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux deps (native-tls / OpenSSL)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Build release
        run: cargo build --release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          cp target/release/zmail "${{ github.workspace }}/dist/zmail"
          cd "${{ github.workspace }}/dist"
          tar czvf "zmail-${RELEASE_VERSION}-${{ matrix.target }}.${{ matrix.ext }}" zmail

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/dist" | Out-Null
          Copy-Item target/release/zmail.exe "${{ github.workspace }}/dist/zmail.exe"
          Set-Location "${{ github.workspace }}/dist"
          Compress-Archive -Path zmail.exe -DestinationPath "zmail-$env:RELEASE_VERSION-${{ matrix.target }}.zip" -Force

      - uses: actions/upload-artifact@v6
        with:
          name: bundle-${{ matrix.target }}
          path: ${{ github.workspace }}/dist/zmail-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: bundle-*
          path: dist
          merge-multiple: true

      - name: SHA256 checksums
        run: |
          cd dist
          sha256sum zmail-* > SHA256SUMS

      - name: Upload workflow artifacts (manual test build, no GitHub Release)
        if: github.event_name == 'workflow_dispatch' && inputs.create_github_release == false
        uses: actions/upload-artifact@v6
        with:
          name: zmail-release-${{ env.RELEASE_VERSION }}
          path: dist/*

      - name: Create GitHub Release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_github_release)
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          artifacts: "dist/*"
          generateReleaseNotes: ${{ github.event_name == 'push' }}
