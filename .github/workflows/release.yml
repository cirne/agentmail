name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build darwin-arm64
        run: bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile dist/zmail-darwin-arm64

      - name: Build linux-x64
        run: bun build src/index.ts --compile --target=bun-linux-x64 --outfile dist/zmail-linux-x64

      - name: Create/update release on public repo
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_PAT }}
          repository: ${{ secrets.RELEASE_REPO }}
          tag_name: latest
          name: Latest Build
          body: |
            Latest build from main branch.
            
            Download:
            - macOS (Apple Silicon): `curl -LO https://github.com/${{ secrets.RELEASE_REPO }}/releases/download/latest/zmail-darwin-arm64`
            - Linux (x64): `curl -LO https://github.com/${{ secrets.RELEASE_REPO }}/releases/download/latest/zmail-linux-x64`
          files: |
            dist/zmail-darwin-arm64
            dist/zmail-linux-x64
          draft: false
          prerelease: false
          make_latest: true

