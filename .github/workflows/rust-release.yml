name: Rust release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps (native-tls / OpenSSL)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build release
        run: cargo build --release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          cp target/release/zmail "${{ github.workspace }}/dist/zmail"
          cd "${{ github.workspace }}/dist"
          tar czvf "zmail-${TAG}-${{ matrix.target }}.${{ matrix.ext }}" zmail

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/dist" | Out-Null
          Copy-Item target/release/zmail.exe "${{ github.workspace }}/dist/zmail.exe"
          Set-Location "${{ github.workspace }}/dist"
          Compress-Archive -Path zmail.exe -DestinationPath "zmail-${{ github.ref_name }}-${{ matrix.target }}.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: ${{ github.workspace }}/dist/zmail-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: dist
          merge-multiple: true

      - name: SHA256 checksums
        run: |
          cd dist
          sha256sum zmail-* > SHA256SUMS

      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: "dist/*"
          generateReleaseNotes: true
