# Eval inbox — all messages used by the ask eval suite.
# Loaded once into a shared in-memory DB before eval tests run.
#
# Date syntax:
#   - "-7d" = 7 days ago
#   - "-0d" = now (current time)
#   - "today+8h" = 8am today
#   - "today+14h" = 2pm today
#   - ISO string (e.g., "2024-01-15T10:30:00Z") = absolute date
#
# Optional fields:
#   - messageId: Unique message ID (auto-generated if not provided)
#   - fromName: Display name for sender
#   - threadId: Thread ID (defaults to messageId if not specified)
#   - toAddresses: JSON array string (default: "[]")
#   - ccAddresses: JSON array string (default: "[]")
#   - isNoise: Mark as noise/promotional (default: false)
#   - labels: JSON array string of Gmail labels (default: "[]")
#   - attachments: Array of attachment objects
#     - filename: Attachment filename
#     - mimeType: MIME type (e.g., "application/pdf", "text/csv")
#     - fixturePath: Path to fixture file relative to project root (e.g., "tests/attachments/fixtures/sales-data.xlsx")
#     - content: Direct text content (mutually exclusive with fixturePath, for small text attachments)
#
# Example (messageId auto-generated):
#   - subject: "Invoice #123"
#     fromAddress: "billing@example.com"
#     bodyText: "Please find attached invoice."
#     date: "-5d"
#     attachments:
#       - filename: "invoice.pdf"
#         mimeType: "application/pdf"
#         fixturePath: "tests/attachments/fixtures/invoice.pdf"
#
# Example (explicit messageId for thread relationships):
#   - messageId: "<thread-1@example.com>"
#     subject: "Re: Project discussion"
#     fromAddress: "alice@example.com"
#     bodyText: "Following up on our discussion..."
#     date: "-2d"
#     threadId: "<thread-1@example.com>"  # Same as messageId for single-message thread

